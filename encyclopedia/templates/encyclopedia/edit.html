{% extends "encyclopedia/layout.html" %}

{% block title %}
    {{title}}
{% endblock %}

{% block body %}
<h1>{{title}}</h1>
<form  action="{% url 'edit' title %}" method="POST">

    {% csrf_token %}

    <input type="text" name="title" placeholder="Title" value="{{title}}" hidden>
<div>

    <textarea name="topic" id="" cols="5" rows="5" value="{{entery}}">{{entery}}</textarea>

</div>
<button type="submit">Update</button>

</form>
{% endblock %}
